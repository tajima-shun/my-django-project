<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Hotels - Home</title>
    <!-- Bootstrap CSS (レスポンシブ & デザイン分離) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏨 Great Hotels</a>
        </div>
    </nav>

    <main class="container my-5 text-center" style="max-width: 500px;">
        <div class="card shadow p-4 bg-white rounded">
            <h1 class="h3 mb-4 fw-normal">最適なホテルを見つけよう</h1>
            <form action="/search/" method="GET" novalidate>
                <div class="mb-3 text-start">
                    <label for="citySelect" class="form-label fw-semibold">都市を選択</label>
                    <select class="form-select form-select-lg" id="citySelect" name="city" aria-label="City Selection">
                        <option value="Aizu" selected>会津 (Aizu)</option>
                        <option value="Tokyo">東京 (Tokyo)</option>
                        <option value="Kyoto">京都 (Kyoto)</option>
                    </select>
                </div>
                <div class="mb-4 text-start">
                    <label for="roomSelect" class="form-label fw-semibold">部屋タイプ</label>
                    <select class="form-select form-select-lg" id="roomSelect" name="room_type" aria-label="Room Type Selection">
                        <option value="Standard" selected>スタンダード (Standard)</option>
                        <option value="Deluxe">デラックス (Deluxe)</option>
                    </select>
                </div>
                <button class="w-100 btn btn-lg btn-primary shadow-sm" type="submit">ホテルを検索</button>
            </form>
        </div>
    </main>

    <footer class="text-center text-muted my-4">
        <small>&copy; 2026 Great Hotels. All rights reserved.</small>
    </footer>
</body>
</html>
