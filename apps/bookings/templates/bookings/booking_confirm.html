<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Hotels - Booking Confirmed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container my-5 text-center" style="max-width: 500px;">
        <div class="card shadow p-5 bg-white rounded border-top border-5 border-success">
            <div class="mb-3 text-success" style="font-size: 3rem;">🎉</div>
            <h1 class="h3 mb-3 text-success fw-bold">ご予約が完了しました！</h1>
            <p class="lead text-muted mb-4">ありがとうございます、{{ guest_name }} 様。</p>
            
            <div class="bg-light p-3 rounded mb-4 text-start">
                <h2 class="h6 fw-bold border-bottom pb-2">ご予約内容詳細</h2>
                <ul class="list-unstyled mb-0">
                    <li class="mb-2"><strong>目的地:</strong> {{ city }}</li>
                    <li class="mb-2"><strong>部屋タイプ:</strong> {{ room_type }}</li>
                    <li><strong>宿泊日数:</strong> 1泊限定 (1-Night Stay)</li>
                </ul>
            </div>
            
            <a href="/" class="btn btn-primary btn-lg shadow-sm w-100">ホームに戻る</a>
        </div>
    </main>
</body>
</html>
