<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Hotels - Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏨 Great Hotels</a>
        </div>
    </nav>

    <main class="container my-5" style="max-width: 600px;">
        <h2 class="h4 mb-4 text-secondary">「{{ city }}」の空室一覧 ({{ room_type }})</h2>
        
        <div class="list-group shadow-sm mb-4">
            <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
                <div>
                    <h5 class="mb-1 fw-bold">Great Hotel {{ city }} Station</h5>
                    <small class="text-muted">駅徒歩1分・アクセス抜群</small>
                </div>
                <span class="badge bg-success rounded-pill">空室あり</span>
            </div>
            <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
                <div>
                    <h5 class="mb-1 fw-bold">{{ city }} Park Hotel</h5>
                    <small class="text-muted">緑豊かな落ち着いたホテル</small>
                </div>
                <span class="badge bg-success rounded-pill">空室あり</span>
            </div>
        </div>

        <div class="card shadow p-4 bg-white rounded">
            <h3 class="h5 mb-3 fw-bold">この条件で予約する</h3>
            <form action="/booking/confirm/" method="POST">
                <input type="hidden" name="city" value="{{ city }}">
                <input type="hidden" name="room_type" value="{{ room_type }}">
                <div class="mb-3">
                    <label for="nameInput" class="form-label fw-semibold">ご宿泊者名</label>
                    <input type="text" class="form-control form-control-lg" id="nameInput" name="guest_name" placeholder="お名前を入力してください" required>
                </div>
                <button class="w-100 btn btn-lg btn-success shadow-sm" type="submit">予約を確定する</button>
            </form>
        </div>
    </main>
</body>
</html>
